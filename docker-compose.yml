services:
  db:
    image: postgres:16-alpine
    container_name: mindbloom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindbloom
      POSTGRES_PASSWORD: mindbloom
      POSTGRES_DB: mindbloom
    ports:
      - "5432:5432"
    volumes:
      - mindbloom-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindbloom -d mindbloom"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: browser-based DB admin at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: mindbloom-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mindbloom-db-data:
